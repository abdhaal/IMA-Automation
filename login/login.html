<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>IMA Automation | Login</title>

<link rel="stylesheet" href="css/login.css">

<link rel="preconnect" href="https://fonts.googleapis.com">

<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

</head>

<body>

<div class="background">

<div class="blur one"></div>

<div class="blur two"></div>

<div class="blur three"></div>

</div>

<div class="login-container">

<div class="left-panel">

<h1>⚡ IMA Automation</h1>

<p>

Meta Business Automation Platform

</p>

<ul>

<li><i class="fa-solid fa-check"></i> Instagram Automation</li>

<li><i class="fa-solid fa-check"></i> Facebook Automation</li>

<li><i class="fa-solid fa-check"></i> Auto DM</li>

<li><i class="fa-solid fa-check"></i> Lead Generation</li>

<li><i class="fa-solid fa-check"></i> Analytics Dashboard</li>

</ul>

</div>

<div class="right-panel">

<div class="login-card">

<h2 id="title">

Welcome Back

</h2>

<p id="subtitle">

Sign in to continue

</p>

<form id="authForm">

<div class="input-box">

<i class="fa-solid fa-envelope"></i>

<input

type="email"

id="email"

placeholder="Email"

required>

</div>

<div class="input-box">

<i class="fa-solid fa-lock"></i>

<input

type="password"

id="password"

placeholder="Password"

required>

<i

class="fa-solid fa-eye"

id="togglePassword">

</i>

</div>

<a href="#"

id="forgotPassword"

class="forgot">

Forgot Password?

</a>

<button

class="login-btn"

type="submit"

id="submitBtn">

Sign In

</button>

</form>

<div class="divider">

<span>OR</span>

</div>

<button

class="google-btn"

id="googleLogin">

<i class="fab fa-google"></i>

Continue with Google

</button>

<p class="switch">

<span id="switchText">

Don't have an account?

</span>

<a href="#"

id="switchMode">

Sign Up

</a>

</p>

</div>

</div>

</div>

<script src="js/auth.js"></script>

</body>

</html>
