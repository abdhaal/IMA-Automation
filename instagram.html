<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Instagram Integration | IMA Automation</title>
    <link rel="stylesheet" href="instagram.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
</head>
<body>

    <div class="sidebar">
        <div class="logo">
            <i class="fa-solid fa-bolt"></i>
        </div>
        <ul>
            <li>
                <a href="dashboard.html" id="dashboardBtn">
                    <i class="fa-solid fa-house"></i>
                </a>
            </li>
            <li class="active">
                <a href="instagram.html" id="instagramBtn">
                    <i class="fa-brands fa-instagram"></i>
                </a>
            </li>
            <li>
                <a href="facebook.html" id="facebookBtn">
                    <i class="fa-brands fa-facebook"></i>
                </a>
            </li>
            <li>
                <a href="automation.html" id="automationBtn">
                    <i class="fa-solid fa-robot"></i>
                </a>
            </li>
            <li>
                <a href="comments.html" id="commentsBtn">
                    <i class="fa-solid fa-comment"></i>
                </a>
            </li>
            <li>
                <a href="autodm.html" id="autodmBtn">
                    <i class="fa-solid fa-paper-plane"></i>
                </a>
            </li>
            <li>
                <a href="keywords.html" id="keywordsBtn">
                    <i class="fa-solid fa-key"></i>
                </a>
            </li>
            <li>
                <a href="analytics.html" id="analyticsBtn">
                    <i class="fa-solid fa-chart-line"></i>
                </a>
            </li>
            <li>
                <a href="settings.html" id="settingsBtn">
                    <i class="fa-solid fa-gear"></i>
                </a>
            </li>
            <li>
                <a href="#" id="logoutBtn">
                    <i class="fa-solid fa-right-from-bracket"></i>
                </a>
            </li>
        </ul>
    </div>

    <div class="main">
        <div class="topbar">
            <div>
                <h1>Instagram Integration</h1>
                <p>Manage Instagram Automation</p>
            </div>
            <div class="profile">
                <i class="fa-solid fa-user"></i>
                <div>
                    <span id="userName">User</span>
                    <span id="userEmail" style="font-size: 12px; color: #94a3b8; display: block;">Loading...</span>
                </div>
            </div>
        </div>

        <div class="cards">
            <div class="card">
                <div class="card-header-icon">
                    <i class="fa-brands fa-instagram"></i>
                </div>
                <h3>Instagram Business</h3>
                <p>Business Account Status</p>
                <div class="status-text" id="instagramStatus" style="color: #f59e0b; font-weight: 700; margin: 15px 0;">Not Connected</div>
                <button id="connectInstagram">Connect Instagram</button>
            </div>

            <div class="card">
                <div class="card-header-icon">
                    <i class="fa-solid fa-circle-info"></i>
                </div>
                <h3>Account Details</h3>
                <p style="margin-bottom: 8px;"><b>Username:</b> <span id="instagramUsername" style="color:#fff;">-</span></p>
                <p style="margin-bottom: 8px;"><b>Followers:</b> <span id="instagramFollowers" style="color:#fff;">0</span></p>
                <p style="margin-bottom: 8px;"><b>Type:</b> <span id="instagramAccountType" style="color:#fff;">Business</span></p>
            </div>

            <div class="card">
                <div class="card-header-icon">
                    <i class="fa-solid fa-toggle-on"></i>
                </div>
                <h3>Automation Config</h3>
                <p style="margin-bottom: 6px;">Comment Reply: <span style="color:#f59e0b; font-weight:600;">OFF</span></p>
                <p style="margin-bottom: 6px;">Auto DM: <span style="color:#f59e0b; font-weight:600;">OFF</span></p>
                <p style="margin-bottom: 20px;">Story Reply: <span style="color:#f59e0b; font-weight:600;">OFF</span></p>
                <button id="goToAutomationBtn">Configure Automation</button>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="instagram.js"></script>
</body>
</html>
